<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://unpkg.com/missing.css@1.3.0" />
        <title>(checks)</title>
        <script>
            function main() {
                const url = new URL(document.URL);

                const n = Number.parseInt(url.searchParams.get("n") ?? "10");
                const name = url.searchParams.get("l") ?? "unnamed";

                document.title = `${name} (checks)`;
                document.getElementById("title").innerText = name;

                const list = document.getElementById("list");
                for (let i = 1; i <= n; i++) {
                    const item = document.createElement("li");
                    const label = document.createElement("label");
                    const check = document.createElement("input");
                    check.type = "checkbox";

                    const key = `${JSON.stringify(name)}-${i}`;
                    check.checked = !!localStorage.getItem(key);

                    check.onchange = e => {
                        if (check.checked) {
                            localStorage.setItem(key, "1");
                        } else {
                            localStorage.removeItem(key);
                        }
                    };

                    label.appendChild(check);
                    item.appendChild(label);
                    list.appendChild(item);
                }
            }

            window.addEventListener("DOMContentLoaded", main);
        </script>
        <style>
            ol {
                /* columns: 3rem;
                column-gap: 2.5rem; */
                display: grid;
                grid-template-columns: repeat(auto-fill, 3rem);
                gap: 2.5rem;
            }

            input[type="checkbox"] {
                transform: scale(3);
                margin-inline-start: 0.75rem;
                /* margin-block: 1.5rem; */
            }
        </style>
    </head>
    <body>
        <main>
            <h1 id="title"></h1>
            <ol id="list" type="1"></ol>
        </main>
    </body>
</html>
