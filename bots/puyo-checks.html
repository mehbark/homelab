<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://unpkg.com/missing.css@1.3.0" />
        <title>(checks)</title>
        <script>
            function main() {
                const url = new URL(document.URL);

                const n = Number.parseInt(url.searchParams.get("n") ?? "10");
                const name = url.searchParams.get("l") ?? "unnamed";

                document.getElementById("title").innerText = name;

                const progress = document.getElementById("progress");
                progress.max = n;

                const done = document.getElementById("done");
                const update = () => {
                    const checked = [
                        ...document.querySelectorAll("input"),
                    ].filter(check => check.checked).length;

                    const finished = checked == n;
                    done.ariaHidden = !finished;
                    document.title = `${finished ? "🎉 " : ""}${name} (checks)`;

                    progress.value = checked;
                };

                const list = document.getElementById("list");
                for (let i = 1; i <= n; i++) {
                    const item = document.createElement("li");
                    const label = document.createElement("label");
                    const check = document.createElement("input");
                    check.type = "checkbox";

                    const key = `${JSON.stringify(name)}-${i}`;
                    check.checked = !!localStorage.getItem(key);

                    check.onchange = e => {
                        if (check.checked) {
                            localStorage.setItem(key, "1");
                        } else {
                            localStorage.removeItem(key);
                        }
                        update();
                    };

                    label.appendChild(check);
                    item.appendChild(label);
                    list.appendChild(item);
                }
                update();
            }

            window.addEventListener("DOMContentLoaded", main);
        </script>
        <style>
            ol {
                /* columns: 3rem;
                column-gap: 2.5rem; */
                display: grid;
                grid-template-columns: repeat(auto-fill, 3rem);
                gap: 2.5rem;
            }

            input[type="checkbox"] {
                transform: scale(3);
                margin-inline-start: 0.75rem;
                /* margin-block: 1.5rem; */
            }

            #done {
                opacity: 100%;
                transition: opacity 0.1s;
                user-select: none;
            }

            #done[aria-hidden="true"] {
                opacity: 0%;
            }

            #progress {
                width: 100%;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>
                <span id="done" aria-hidden="true" aria-label="completed:"
                    >🎉 </span
                ><span id="title"></span>
            </h1>
            <div id="stats">
                <progress id="progress" aria-label="progress"></progress>
            </div>
            <ol id="list" type="1"></ol>
        </main>
    </body>
</html>
