<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://unpkg.com/missing.css@1.3.0" />
        <title>(checks)</title>
        <script>
            function create_list() {
                const url = new URL(window.location);
                const number = document.getElementById("number");
                const name = document.getElementById("name");
                url.searchParams.set("n", +number.value);
                url.searchParams.set("l", name.value);
                window.history.pushState({}, "", url);
                main();
            }

            function main() {
                const url = new URL(document.URL);

                const n = Number.parseInt(url.searchParams.get("n"));
                const name = url.searchParams.get("l");

                const create = document.getElementById("create");
                create.hidden = true;

                const stats = document.getElementById("stats");
                stats.hidden = false;

                const list = document.getElementById("list");
                list.hidden = false;
                list.innerHTML = "";

                const done = document.getElementById("done");

                if (!Number.isFinite(n) || !name) {
                    create.hidden = false;
                    stats.hidden = true;
                    done.ariaHidden = true;
                    document.getElementById("title").innerText = "checks";
                    document.title = "(checks)";
                    return;
                }

                document.getElementById("title").innerText = name;

                const progress = document.getElementById("progress");

                const update = () => {
                    const checked = [
                        ...document.querySelectorAll("input"),
                    ].filter(check => check.checked).length;

                    const finished = checked == n;
                    done.ariaHidden = !finished;
                    document.title = `${finished ? "🎉 " : ""}${name} (checks)`;

                    progress.value = checked;
                };

                for (let i = 1; i <= n; i++) {
                    const item = document.createElement("li");
                    const label = document.createElement("label");
                    const check = document.createElement("input");
                    check.type = "checkbox";

                    const key = `${JSON.stringify(name)}-${i}`;
                    check.checked = !!localStorage.getItem(key);

                    check.onchange = e => {
                        if (check.checked) {
                            localStorage.setItem(key, "1");
                        } else {
                            localStorage.removeItem(key);
                        }
                        update();
                    };

                    label.appendChild(check);
                    item.appendChild(label);
                    list.appendChild(item);
                }
                progress.max = n;
                update();
            }

            window.addEventListener("DOMContentLoaded", main);
            window.addEventListener("popstate", main);
        </script>
        <style>
            ol {
                /* columns: 3rem;
                column-gap: 2.5rem; */
                display: grid;
                grid-template-columns: repeat(auto-fill, 3rem);
                gap: 2.5rem;
            }

            input[type="checkbox"] {
                transform: scale(3);
                margin-inline-start: 0.75rem;
                /* margin-block: 1.5rem; */
            }

            #done {
                opacity: 100%;
                transition: opacity 0.1s;
                user-select: none;
            }

            #done[aria-hidden="true"] {
                opacity: 0%;
            }

            #progress {
                width: 100%;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>
                <span id="done" aria-hidden="true" aria-label="completed:"
                    >🎉 </span
                ><span id="title">checks</span>
            </h1>
            <div id="stats" hidden>
                <progress id="progress" aria-label="progress"></progress>
            </div>
            <ol id="list" type="1" hidden></ol>
            <form
                id="create"
                class="table rows box"
                action="javascript:void(0);"
                onsubmit="create_list()"
                hidden
            >
                <p>
                    <label for="number">count:</label
                    ><input id="number" type="number" value="10" />
                </p>
                <p>
                    <label for="name">list name:</label
                    ><input id="name" autocomplete="list name" />
                </p>
                <input type="submit" value="create" />
            </form>
        </main>
    </body>
</html>
